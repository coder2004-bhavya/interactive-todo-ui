<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive To-Do</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>My To-Do List</h1>
      <p>Plan your day, stay focused, and get things done.</p>
    </header>

    <section class="card input-card">
      <form id="todo-form" class="todo-form" autocomplete="off">
        <label for="todo-input" class="sr-only">Add a task</label>
        <input
          id="todo-input"
          type="text"
          placeholder="What do you need to do?"
          maxlength="120"
          required
        />
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="card controls-card">
      <div class="filters" role="group" aria-label="Filter tasks">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clear-completed" class="ghost-btn">Clear Completed</button>
    </section>

    <section class="card list-card">
      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add one to get started.</p>
    </section>

    <footer class="app__footer">
      <span id="tasks-left">0 tasks left</span>
    </footer>
  </main>

  <template id="todo-item-template">
    <li class="todo-item">
      <label class="todo-main">
        <input type="checkbox" class="todo-checkbox" />
        <span class="todo-text"></span>
      </label>
      <div class="todo-actions">
        <button class="icon-btn edit-btn" title="Edit task" aria-label="Edit task">Edit</button>
        <button class="icon-btn delete-btn" title="Delete task" aria-label="Delete task">Delete</button>
      </div>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
